<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIR LED Display</title>
    <style>
        /* Grundlayout */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        /* Hintergrund-Diashow mit weichem Übergang */
        #slideshow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: background-image 1.5s ease-in-out;
            z-index: 1;
        }

        /* Overlay für bessere Lesbarkeit der Schrift */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.7) 100%);
            z-index: 2;
        }

        /* Wetter-Widget oben rechts */
        #weather-box {
            position: absolute; top: 30px; right: 30px; z-index: 10;
            background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* News-Ticker unten */
        #ticker-container {
            position: absolute; bottom: 0; width: 100%; height: 70px;
            background: rgba(0, 0, 0, 0.85); color: #fff;
            display: flex; align-items: center; z-index: 10; border-top: 2px solid #ed1c24;
        }

        #ticker-label {
            background: #ed1c24; padding: 0 20px; height: 100%;
            display: flex; align-items: center; font-weight: bold; font-size: 20px;
            text-transform: uppercase; z-index: 11;
        }

        #ticker-wrap { flex: 1; overflow: hidden; white-space: nowrap; }

        .ticker-move {
            display: inline-block; padding-left: 100%;
            font-size: 28px; animation: ticker-animation 40s linear infinite;
        }

        @keyframes ticker-animation {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

    <div id="slideshow"></div>
    <div class="overlay"></div>

    <div id="weather-box">
        <script type="text/javascript" src="https://www.booked.net/weather/widgets/js/?type=13&id=18357&name=Berlin&caption=1&font=0&font_size=1&style=1&color=ffffff&sw_color=ffffff&be_color=ffffff&l_color=333333&v_color=333333&f_color=333333&p_color=333333&i_color=333333&f_weight=0&p_weight=0&i_weight=0&f_style=0&p_style=0&i_style=0&v_weight=0&v_style=0&p_s=0&i_s=0&v_s=0&v_p=0&v_i=0&v_n=0&v_c=0&v_t=0&v_d=1"></script>
    </div>

    <div id="ticker-container">
        <div id="ticker-label">Live News</div>
        <div id="ticker-wrap">
            <div class="ticker-move" id="ticker-content">Lade aktuelle Schlagzeilen...</div>
        </div>
    </div>

    <script>
        // EINSTELLUNGEN
        const imageFiles = ["bild1.jpg", "bild2.jpg", "bild3.jpg"]; // Deine Dateinamen
        const displayTime = 12000; // Zeit pro Bild in Millisekunden (12 Sek)
        const rssUrl = 'https://www.tagesschau.de/infosrv/rss/all/'; // News Quelle

        // DIASHOW LOGIK
        let currentImg = 0;
        const slideElement = document.getElementById('slideshow');

        function nextSlide() {
            slideElement.style.backgroundImage = `url('${imageFiles[currentImg]}')`;
            currentImg = (currentImg + 1) % imageFiles.length;
        }
        setInterval(nextSlide, displayTime);
        nextSlide();

        // NEWS TICKER LOGIK (via RSS2JSON für einfache Verarbeitung)
        async function updateNews() {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
                const data = await res.json();
                const newsString = data.items.map(item => item.title).join("  +++  ");
                document.getElementById('ticker-content').innerText = newsString + "  +++  ";
            } catch (e) {
                document.getElementById('ticker-content').innerText = "Nachrichten konnten nicht geladen werden.";
            }
        }
        updateNews();
        setInterval(updateNews, 1800000); // Alle 30 Min neue News holen
    </script>
</body>
</html>
