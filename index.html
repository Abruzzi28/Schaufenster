<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="21600">
    <title>Allianz Senk Schaufenster</title>
    <style>
        :root {
            --allianz-gold: #a3890e;
            --koenigsblau: #003781;
            --glass: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #001a3d; }

        /* Hintergrund-Diashow */
        #slideshow {
            position: fixed; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: background-image 1.5s ease-in-out;
            z-index: 1;
        }

        #logo {
            position: absolute; top: 40px; right: 40px; width: 350px; z-index: 100;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* Wetter Box */
        #weather-container {
            position: absolute; top: 40px; left: 40px; z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 10px; overflow: hidden;
        }

        /* News Ticker */
        #ticker-container {
            position: absolute; bottom: 40px; left: 5%; width: 90%; height: 80px; z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px; display: flex; align-items: center; overflow: hidden;
        }

        #ticker-label {
            background: var(--allianz-gold); color: white;
            padding: 0 30px; height: 100%; display: flex; align-items: center;
            font-weight: bold; font-size: 22px;
        }

        #ticker-wrap { flex: 1; overflow: hidden; white-space: nowrap; }

        .ticker-move {
            display: inline-block; padding-left: 100%;
            font-size: 28px; color: white;
            animation: ticker-animation 60s linear infinite;
        }

        @keyframes ticker-animation {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        #clock {
            position: absolute; top: 320px; left: 60px; z-index: 10;
            color: white; font-size: 50px; font-weight: 300;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="slideshow"></div>
    <img src="logo.png" id="logo">
    <div id="clock"></div>

    <div id="weather-container">
        <iframe src="https://www.wetter.de/deutschland/wetter-bad-honnef-18220804/wetterbericht-aktuell.html" 
                style="width:300px; height:220px; border:none;" scrolling="no"></iframe>
    </div>

    <div id="ticker-container">
        <div id="ticker-label">AKTUELL</div>
        <div id="ticker-wrap">
            <div class="ticker-move" id="ticker-content">Herzlich Willkommen bei der Allianz Vertretung Senk in Bad Honnef +++ Ihr Partner für Versicherung und Vorsorge +++</div>
        </div>
    </div>

    <script>
        // 1. BILDER-LOGIK (Automatisch 1 bis 14)
        const totalImages = 14;
        let currentImg = 1;
        const slideElement = document.getElementById('slideshow');

        function nextSlide() {
            // Wir bauen den Namen exakt nach deinem Schema: karneval26 (1).jpg
            // encodeURI kümmert sich um die Leerzeichen und Klammern
            const fileName = `karneval26 (${currentImg}).jpg`;
            slideElement.style.backgroundImage = `url("${encodeURI(fileName)}")`;
            
            currentImg++;
            if (currentImg > totalImages) currentImg = 1;
        }
        
        setInterval(nextSlide, 8000); 
        nextSlide();

        // 2. UHRZEIT
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 3. NEWS TICKER (Tagesschau via AllOrigins Proxy gegen "Lade"-Hänger)
        async function updateNews() {
            const ticker = document.getElementById('ticker-content');
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.tagesschau.de/infosrv/rss/all/')}`);
                const data = await res.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.getElementsByTagName("item");
                let newsLine = "";
                for (let i = 0; i < 10; i++) {
                    newsLine += items[i].getElementsByTagName("title")[0].childNodes[0].nodeValue + "  +++  ";
                }
                ticker.innerText = newsLine;
            } catch (e) {
                console.log("News-Fehler, nutze Fallback");
                ticker.innerText = "+++ Allianz Senk Bad Honnef +++ Schnelle Hilfe im Schadensfall +++ Jetzt beraten lassen +++ Ihr Team in Bad Honnef wünscht eine gute Fahrt +++";
            }
        }
        updateNews();
        setInterval(updateNews, 1800000);
    </script>
</body>
</html>
