<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Schaufenster Allianz Senk</title>
    <style>
        :root {
            --allianz-gold: #a3890e; /* Das Gold aus deinem Logo */
            --koenigsblau: #003781;  /* Klassisches Allianz Blau */
            --glass: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; }

        /* Hintergrund-Diashow mit Zoom-Effekt (Ken Burns) */
        #slideshow {
            position: fixed; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: background-image 2s ease-in-out;
            z-index: 1;
            transform: scale(1.05);
        }

        /* Permanentes Logo oben rechts */
        #logo {
            position: absolute; top: 40px; right: 40px; width: 350px; z-index: 100;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* Wetter-Box mit Glass-Effekt */
        #weather-container {
            position: absolute; top: 40px; left: 40px; z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* News Ticker mit Glass-Effekt */
        #ticker-container {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 80px; z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            display: flex; align-items: center; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        #ticker-label {
            background: var(--allianz-gold); color: white;
            padding: 0 30px; height: 100%; display: flex; align-items: center;
            font-weight: bold; font-size: 22px; letter-spacing: 1px;
            border-right: 1px solid var(--glass-border);
        }

        #ticker-wrap { flex: 1; overflow: hidden; white-space: nowrap; }

        .ticker-move {
            display: inline-block; padding-left: 100%;
            font-size: 26px; color: white; font-weight: 400;
            animation: ticker-animation 45s linear infinite;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
        }

        @keyframes ticker-animation {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* Uhrzeit Box (Hell & Freundlich) */
        #clock {
            position: absolute; top: 250px; left: 40px; z-index: 10;
            color: white; font-size: 40px; font-weight: 200;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="slideshow"></div>
    <img src="logo.png" id="logo" alt="Allianz Senk Logo">

    <div id="clock"></div>

    <div id="weather-container">
        <script type="text/javascript" src="https://www.booked.net/weather/widgets/js/?type=13&id=18151&name=Bad%20Honnef&caption=1&font=0&font_size=1&style=1&color=ffffff&sw_color=ffffff&be_color=ffffff&l_color=333333&v_color=333333&f_color=333333&p_color=333333&i_color=333333&f_weight=0&p_weight=0&i_weight=0&f_style=0&p_style=0&i_style=0&v_weight=0&v_style=0&p_s=0&i_s=0&v_s=0&v_p=0&v_i=0&v_n=0&v_c=0&v_t=0&v_d=1"></script>
    </div>

    <div id="ticker-container">
        <div id="ticker-label">AKTUELL</div>
        <div id="ticker-wrap">
            <div class="ticker-move" id="ticker-content">Lade Nachrichten...</div>
        </div>
    </div>

    <script>
        // BILDERLISTE (Hier deine Dateinamen anpassen)
        const imageFiles = ["bild1.jpg", "bild2.jpg", "bild3.jpg"]; 
        let currentImg = 0;
        const slideElement = document.getElementById('slideshow');

        function nextSlide() {
            slideElement.style.backgroundImage = `url('${imageFiles[currentImg]}')`;
            currentImg = (currentImg + 1) % imageFiles.length;
        }
        setInterval(nextSlide, 10000); // Alle 10 Sekunden
        nextSlide();

        // UHRZEIT
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        // NEWS (Tagesschau RSS)
        async function updateNews() {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.tagesschau.de%2Finfosrv%2Frss%2Fall%2F`);
                const data = await res.json();
                document.getElementById('ticker-content').innerText = data.items.map(i => i.title).join("  +++  ") + " +++ ";
            } catch (e) { console.error("News error"); }
        }
        updateNews();
        setInterval(updateNews, 1800000);
    </script>
</body>
</html>
