<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allianz Senk Schaufenster</title>
    <style>
        :root {
            --allianz-gold: #a3890e;
            --koenigsblau: #003781;
            --glass: rgba(255, 255, 255, 0.15);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: #001a3d; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Hintergrund-Bilder */
        #slideshow {
            position: fixed; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1.5s ease-in-out;
            z-index: 1;
        }

        #logo { 
            position: absolute; top: 40px; right: 40px; 
            width: 350px; z-index: 100; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* Wetter Box */
        #weather-box {
            position: absolute; top: 40px; left: 40px; z-index: 10;
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.2);
            color: white; min-width: 200px;
        }

        /* News Ticker */
        #ticker-container {
            position: absolute; bottom: 40px; left: 5%; width: 90%; height: 80px; z-index: 10;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 40px; display: flex; align-items: center; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #ticker-label { 
            background: var(--allianz-gold); color: white; 
            padding: 0 30px; height: 100%; display: flex; 
            align-items: center; font-weight: bold; font-size: 24px; 
        }

        #ticker-wrap { flex: 1; overflow: hidden; }
        .ticker-move { 
            display: inline-block; white-space: nowrap; padding-left: 100%; 
            font-size: 28px; color: white; 
            animation: ticker-animation 50s linear infinite; 
        }

        @keyframes ticker-animation { 0% { transform: translateX(0); } 100% { transform: translateX(-250%); } }

        #clock { 
            position: absolute; top: 250px; left: 60px; z-index: 10; 
            color: white; font-size: 60px; font-weight: 200;
            text-shadow: 0 4px 15px rgba(0,0,0,0.7); 
        }
    </style>
</head>
<body>

    <div id="slideshow"></div>
    <img src="logo.png" id="logo">
    <div id="clock"></div>

    <div id="weather-box">
        <div style="font-size: 1.2em; color: var(--allianz-gold); font-weight: bold; margin-bottom: 5px;">Bad Honnef</div>
        <div id="temp" style="font-size: 2.5em; font-weight: bold;">--°C</div>
        <div id="desc" style="font-size: 1.1em; opacity: 0.8;">Lade Wetter...</div>
    </div>

    <div id="ticker-container">
        <div id="ticker-label">AKTUELL</div>
        <div id="ticker-wrap">
            <div class="ticker-move" id="ticker-content">+++ Willkommen bei Allianz Senk Bad Honnef +++ Ihr Partner für Versicherung und Vorsorge +++ Wir wünschen eine schöne Karnevalszeit! +++ Alaaf aus Bad Honnef +++</div>
        </div>
    </div>

    <script>
        // 1. FOTOS - Dynamische URL-Erzeugung
        const totalImages = 14;
        let currentImg = 1;
        const slideElement = document.getElementById('slideshow');

        function nextSlide() {
            // WICHTIG: Die exakte Schreibweise inkl. Leerzeichen
            const fileName = `karneval26 (${currentImg}).jpg`;
            // Browser brauchen für Leerzeichen in URLs %20
            const urlSafeName = fileName.replace(/ /g, '%20'); 
            
            const img = new Image();
            img.src = urlSafeName;
            img.onload = () => {
                slideElement.style.backgroundImage = `url('${urlSafeName}')`;
            };
            img.onerror = () => {
                console.error("Bild nicht gefunden:", urlSafeName);
            };

            currentImg = (currentImg % totalImages) + 1;
        }
        
        setInterval(nextSlide, 8000); 
        nextSlide();

        // 2. UHRZEIT
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // 3. WETTER (Simpel & Stabil über eine offene API)
        async function updateWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=50.6444&longitude=7.2274&current_weather=true');
                const data = await res.json();
                document.getElementById('temp').innerText = Math.round(data.current_weather.temperature) + "°C";
                document.getElementById('desc').innerText = "In Bad Honnef";
            } catch (e) {
                document.getElementById('desc').innerText = "Wetter aktuell nicht verfügbar";
            }
        }
        updateWeather();
        setInterval(updateWeather, 1800000);

        // 4. NEWS (Fallback-Sicherheit)
        async function updateNews() {
            try {
                const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.tagesschau.de/infosrv/rss/all/');
                const data = await res.json();
                if(data.items) {
                    document.getElementById('ticker-content').innerText = data.items.map(i => i.title).join("  +++  ") + " +++ ";
                }
            } catch (e) {
                console.log("Nutze Allianz-Standard-Ticker");
            }
        }
        updateNews();
    </script>
</body>
</html>
